{% extends "base.html" %}

{% block title %}诗词自动生成系统{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">

        <!-- 标题印章 -->
        <div class="title-area">
            <div class="title-seal">
                <span class="seal-char">詩</span>
            </div>
            <p class="title-subtitle">基于深度学习的唐诗宋词自动生成</p>
        </div>

        <!-- Tab 签条导航 -->
        <ul class="nav nav-tabs mb-4" id="modeTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="keyword-tab" data-bs-toggle="tab" data-bs-target="#keyword-panel" type="button">
                    关键字生成
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="scene-tab" data-bs-toggle="tab" data-bs-target="#scene-panel" type="button">
                    场景生成
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="image-tab" data-bs-toggle="tab" data-bs-target="#image-panel" type="button">
                    图片生成
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="history-tab" data-bs-toggle="tab" data-bs-target="#history-panel" type="button" onclick="loadHistoryIfNeeded()">
                    生成历史
                </button>
            </li>
            <li class="nav-item" role="presentation">
                <button class="nav-link" id="browse-tab" data-bs-toggle="tab" data-bs-target="#browse-panel" type="button" onclick="loadBrowseIfNeeded()">
                    诗词浏览
                </button>
            </li>
        </ul>

        <!-- Tab 内容区 -->
        <div class="tab-content" id="modeTabsContent">

            <!-- F1: 关键字生成 -->
            <div class="tab-pane fade show active" id="keyword-panel">
                <div class="card">
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">请输入关键字</label>
                            <input type="text" class="form-control" id="keyword-input" placeholder="春 · 月 · 花 · 山 · 水…" maxlength="10">
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-4">
                                <label class="form-label">风格</label>
                                <select class="form-select" id="keyword-style" onchange="onStyleChange()">
                                    <option value="tang">唐诗</option>
                                    <option value="song">宋词</option>
                                </select>
                            </div>
                            <div class="col-md-4" id="tang-lines-group">
                                <label class="form-label">句数</label>
                                <select class="form-select" id="keyword-lines">
                                    <option value="4">四句 (绝句)</option>
                                    <option value="8" selected>八句 (律诗)</option>
                                    <option value="12">十二句 (排律)</option>
                                </select>
                            </div>
                            <div class="col-md-4" id="song-lines-group" style="display:none">
                                <label class="form-label">最少句数</label>
                                <select class="form-select" id="song-lines">
                                    <option value="6">至少六句</option>
                                    <option value="8" selected>至少八句</option>
                                    <option value="10">至少十句</option>
                                    <option value="12">至少十二句</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">创造力</label>
                                <input type="range" class="form-range" id="keyword-temp" min="0.1" max="1.5" step="0.1" value="0.8">
                            </div>
                        </div>
                        <button class="btn btn-primary w-100" onclick="generateKeyword()">
                            挥毫生成
                        </button>
                    </div>
                </div>
            </div>

            <!-- F2: 场景生成 -->
            <div class="tab-pane fade" id="scene-panel">
                <div class="card">
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">请描述一个场景</label>
                            <textarea class="form-control" id="scene-input" rows="3" placeholder="春日江边，柳树摇曳，心情舒畅…"></textarea>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-3">
                                <label class="form-label">行数</label>
                                <select class="form-select" id="scene-lines">
                                    <option value="4">四句 (绝句)</option>
                                    <option value="8">八句 (律诗)</option>
                                    <option value="12">十二句 (排律)</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label">创造力</label>
                                <input type="range" class="form-range" id="scene-temp" min="0.1" max="1.5" step="0.1" value="0.8">
                            </div>
                            <div class="col-md-6">
                                <div id="analysis-preview" class="small text-muted mt-4"></div>
                            </div>
                        </div>
                        <button class="btn btn-primary w-100" onclick="generateScene()">
                            挥毫生成
                        </button>
                    </div>
                </div>
            </div>

            <!-- F3: 图片生成 -->
            <div class="tab-pane fade" id="image-panel">
                <div class="card">
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">上传图片</label>
                            <div class="upload-area border rounded p-4 text-center" id="upload-area">
                                <div id="upload-placeholder">
                                    <p class="text-muted mb-1">拖拽图片到此处或点击上传</p>
                                    <small class="text-muted">支持 jpg / png / gif / webp，最大 10MB</small>
                                </div>
                                <img id="image-preview" class="img-fluid rounded d-none" style="max-height: 200px;">
                                <input type="file" id="image-file" class="d-none" accept="image/*">
                            </div>
                        </div>
                        <div class="row g-3 mb-3">
                            <div class="col-md-4">
                                <label class="form-label">行数</label>
                                <select class="form-select" id="image-lines">
                                    <option value="4">四句</option>
                                    <option value="8">八句</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">创造力</label>
                                <input type="range" class="form-range" id="image-temp" min="0.1" max="1.5" step="0.1" value="0.8">
                            </div>
                            <div class="col-md-4">
                                <div id="labels-preview" class="small text-muted mt-4"></div>
                            </div>
                        </div>
                        <button class="btn btn-primary w-100" onclick="generateImage()">
                            挥毫生成
                        </button>
                    </div>
                </div>
            </div>

            <!-- F4: 生成历史 -->
            <div class="tab-pane fade" id="history-panel">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="mb-0" style="font-family:'Noto Serif SC',serif;">生成历史</h5>
                            <select class="form-select form-select-sm w-auto" id="history-filter" onchange="applyHistoryFilter()">
                                <option value="all">全部</option>
                                <option value="keyword">关键字</option>
                                <option value="scene">场景</option>
                                <option value="image">图片</option>
                            </select>
                        </div>
                        <div id="history-list"></div>
                        <div id="history-empty" class="text-center py-5" style="display:none;">
                            <p style="font-size:2rem;">📭</p>
                            <p>暂无生成记录，快去生成一首吧～</p>
                        </div>
                        <div class="text-center mt-3" id="history-load-more" style="display:none;">
                            <button class="btn btn-outline-primary btn-sm" onclick="loadMoreHistory()">加载更多</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- F5: 诗词浏览 -->
            <div class="tab-pane fade" id="browse-panel">
                <div class="card">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h5 class="mb-0" style="font-family:'Noto Serif SC',serif;">诗词浏览</h5>
                            <select class="form-select form-select-sm w-auto" id="browse-filter" onchange="applyBrowseFilter()">
                                <option value="all">全部</option>
                                <option value="keyword">关键字</option>
                                <option value="scene">场景</option>
                                <option value="image">图片</option>
                            </select>
                        </div>
                        <div class="row g-3" id="browse-cards"></div>
                        <div id="browse-empty" class="text-center py-5" style="display:none;">
                            <p style="font-size:2rem;">📭</p>
                            <p>暂无生成记录，快去生成一首吧～</p>
                        </div>
                        <div class="text-center mt-3" id="browse-load-more" style="display:none;">
                            <button class="btn btn-outline-primary btn-sm" onclick="loadMoreBrowse()">加载更多</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div id="result-card" style="display: none;">
            <div class="card mt-4">
                <div class="card-body">
                    <div class="d-flex justify-content-between align-items-center mb-2">
                        <h5 class="mb-0">生成结果</h5>
                        <div class="d-flex gap-2">
                            <button class="btn btn-outline-secondary btn-sm" onclick="copyPoem()">复制</button>
                            <button class="btn btn-outline-secondary btn-sm" onclick="regenerate()">重新生成</button>
                        </div>
                    </div>
                    <div class="poem-scroll">
                        <div class="scroll-rod top"></div>
                        <div class="poem-display" id="poem-display"></div>
                        <div class="scroll-rod bottom"></div>
                    </div>
                    <div class="mt-3 d-flex justify-content-between">
                        <span id="rhyme-info"></span>
                        <span id="time-info"></span>
                    </div>
                    <div id="extra-info" class="mt-2"></div>
                </div>
            </div>
        </div>

        <!-- 错误提示 -->
        <div class="alert alert-danger mt-3" id="error-alert" style="display: none;"></div>

        <!-- 墨韵 Loading -->
        <div class="text-center mt-3" id="loading-spinner" style="display: none;">
            <div class="ink-loading" role="status" aria-live="polite">
                <div class="ink-brush" aria-hidden="true"></div>
                <span class="ink-loading-text">研墨中，静候佳句…</span>
                <span class="visually-hidden">正在生成诗词</span>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block modal %}
<!-- 诗词详情模态框（在 main 外部，避免 z-index 被 stacking context 限制） -->
<div class="modal fade" id="poem-modal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="poem-modal-title"></h5>
                <button type="button" class="btn-close" onclick="closePoemModal()"></button>
            </div>
            <div class="modal-body">
                <div class="poem-scroll">
                    <div class="scroll-rod top"></div>
                    <div class="poem-display" id="poem-modal-body"></div>
                    <div class="scroll-rod bottom"></div>
                </div>
                <div class="small text-muted mt-3" id="poem-modal-meta"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline-secondary btn-sm" onclick="copyModalPoem()">复制</button>
                <button class="btn btn-outline-secondary btn-sm" onclick="closePoemModal()">关闭</button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
